name: Clang Format

on:
  push:
    branches: ["main"]
    paths-ignore: ["**/*.md", "docs/**", "single_header/omni.hpp"]
  pull_request:
    branches: ["main"]
    paths-ignore: ["**/*.md", "docs/**", "single_header/omni.hpp"]
  workflow_dispatch:

jobs:
  verify_fmt:
    name: Run
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: "21"
          exclude-regex: "^./single_header/omni\\.hpp$|^single_header/omni\\.hpp$"