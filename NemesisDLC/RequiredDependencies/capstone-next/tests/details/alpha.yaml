test_cases:
  -
    input:
      bytes: [ 0x02, 0x00, 0xbb, 0x27, 0x50, 0x7a, 0xbd, 0x23, 0xd0, 0xff, 0xde, 0x23, 0x00, 0x00, 0x5e, 0xb7  ]
      arch: "alpha"
      options: [ CS_OPT_DETAIL ]
      address: 0x0
    expected:
      insns:
      -
        asm_text: "ldah $29,2($27)"
        details:
          regs_read: [ $27 ]
          regs_write: [ $28, $29 ]
          alpha:
            operands:
              -
                type: ALPHA_OP_REG
                reg: $29
              -
                type: ALPHA_OP_IMM
                imm: 0x2
              -
                type: ALPHA_OP_REG
                reg: $27
      -
        asm_text: "lda $29,0x7a50($29)"
        details:
          regs_read: [ $29 ]
          regs_write: [ $28, $29 ]
          alpha:
            operands:
              -
                type: ALPHA_OP_REG
                reg: $29
              -
                type: ALPHA_OP_IMM
                imm: 0x7a50
              -
                type: ALPHA_OP_REG
                reg: $29
      -
        asm_text: "lda $30,0xffd0($30)"
        details:
          regs_read: [ $30 ]
          regs_write: [ $28, $30 ]
          alpha:
            operands:
              -
                type: ALPHA_OP_REG
                reg: $30
              -
                type: ALPHA_OP_IMM
                imm: 0xffd0
              -
                type: ALPHA_OP_REG
                reg: $30
      -
        asm_text: "stq $26,0($30)"
        details:
          regs_read: [ $26, $30 ]
          regs_write: [ $28 ]
          alpha:
            operands:
              -
                type: ALPHA_OP_REG
                reg: $26
              -
                type: ALPHA_OP_IMM
                imm: 0x0
              -
                type: ALPHA_OP_REG
                reg: $30
