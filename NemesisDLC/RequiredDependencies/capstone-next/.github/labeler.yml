Auto-Sync-files:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - suite/auto-sync/**

LLVM-core-files:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - MC*.[ch]

LLVM-generated-files:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - arch/*/*.inc

Documentation:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'

CS-core-files:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - cs*.[ch]
      - SStream.[ch]
      - utis.[ch]
      - MathExtras.h
      - Mapping.[ch]
      - LEB128.h
      - cstool/cstool.[ch]
      - cstool/getopt.[ch]
      - include/capstone/capstone.h
      - include/capstone/cs_operand.h
      - include/capstone/platform.h

ARM:
- any:
  - changed-files:
    - any-glob-to-any-file:
      - arch/ARM/**
      - cstool/cstool_arm.c
      - include/capstone/arm.h
      - suite/MC/ARM/**
      - tests/MC/ARM/**
      - tests/details/arm.yaml

